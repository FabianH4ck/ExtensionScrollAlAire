<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrollSense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #05050C;
      --bg-panel: #0B0B18;
      --surface: #12122A;
      --primary: #5EEAD4;
      --primary-dim: rgba(94, 234, 212, 0.15);
      --accent: #F472B6;
      --accent-dim: rgba(244, 114, 182, 0.12);
      --amber: #FBBF24;
      --text: #EEEFFC;
      --muted: #8888AA;
      --soft: #55557A;
      --border: rgba(94, 234, 212, 0.12);
      --shadow: 0 0 40px rgba(0, 0, 0, 0.6);
      --radius: 12px;
      --font: 'Sora', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 500px;
      color: var(--text);
      font: 400 13px/1.4 var(--font);
      background: var(--bg-deep);
      overflow: hidden;
    }

    /* ░ grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(94, 234, 212, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(94, 234, 212, 0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      padding: 18px 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ═══ HERO ═══ */
    .hero {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      overflow: hidden;
      flex: 0 0 auto;
      position: relative;
      background: var(--surface);
      border: 1px solid rgba(94, 234, 212, 0.2);
      box-shadow: 0 0 20px rgba(94, 234, 212, 0.08), inset 0 0 20px rgba(94, 234, 212, 0.03);
    }
    .brand-icon img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }

    .title h1 {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #5EEAD4 0%, #F472B6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .title p {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* ═══ STATUS PILL ═══ */
    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--soft);
      flex: 0 0 auto;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status.active .status-dot {
      background: var(--primary);
      box-shadow: 0 0 12px rgba(94, 234, 212, 0.8);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 12px rgba(94, 234, 212, 0.6); }
      50% { box-shadow: 0 0 24px rgba(94, 234, 212, 0.9); }
    }

    .status-text {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 400;
      transition: color 0.3s;
    }
    .status.active .status-text {
      color: var(--primary);
    }

    .status-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--primary-dim);
      color: var(--primary);
      transition: background 0.3s, color 0.3s;
    }
    .status.active .status-badge {
      background: rgba(94, 234, 212, 0.2);
    }

    /* ═══ TOGGLE ═══ */
    .toggle-wrap {
      position: relative;
    }

    .toggle-btn {
      width: 100%;
      height: 50px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font: 700 14px var(--font);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      letter-spacing: 0.01em;
    }
    .toggle-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--primary-dim), var(--accent-dim));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toggle-btn:hover {
      border-color: rgba(94, 234, 212, 0.25);
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .toggle-btn.on {
      color: var(--text);
      border-color: rgba(94, 234, 212, 0.35);
      box-shadow: 0 0 30px rgba(94, 234, 212, 0.08), inset 0 0 30px rgba(94, 234, 212, 0.03);
    }
    .toggle-btn.on::before {
      opacity: 1;
    }
    .toggle-btn:active {
      transform: translateY(0);
    }

    #btnLabel {
      position: relative;
      z-index: 1;
    }

    /* ═══ SECTIONS ═══ */
    .section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-header span {
      color: var(--soft);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .section-header .label-accent {
      color: var(--primary);
    }

    .control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .control-info h2 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .control-info p {
      margin-top: 1px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 400;
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    /* ═══ CUSTOM RANGE ═══ */
    input[type="range"] {
      width: 80px;
      height: 3px;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      outline: none;
      transition: background 0.2s;
    }
    input[type="range"]:hover {
      background: rgba(255, 255, 255, 0.12);
    }
    input[type="range"]::-webkit-slider-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      appearance: none;
      -webkit-appearance: none;
      background: var(--surface);
      border: 2px solid var(--primary);
      box-shadow: 0 0 12px rgba(94, 234, 212, 0.4);
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 20px rgba(94, 234, 212, 0.6);
    }
    input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(0.95);
    }

    .slider-val {
      min-width: 28px;
      font-size: 12px;
      font-weight: 800;
      text-align: right;
      color: var(--primary);
      font-variant-numeric: tabular-nums;
    }

    /* ═══ GESTURE MAP ═══ */
    .gesture-map {
      position: relative;
      height: 100px;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-top: 2px;
    }
    .gesture-map::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(94, 234, 212, 0.06), transparent 30%, transparent 70%, rgba(244, 114, 182, 0.06));
      pointer-events: none;
    }

    .zone-top, .zone-bottom {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: height 0.25s ease;
      z-index: 1;
    }
    .zone-top {
      top: 0;
      height: 25%;
      color: var(--primary);
      border-bottom: 1px dashed rgba(94, 234, 212, 0.25);
    }
    .zone-bottom {
      bottom: 0;
      height: 25%;
      color: var(--accent);
      border-top: 1px dashed rgba(244, 114, 182, 0.25);
    }

    .zone-mid {
      position: absolute;
      inset: 25% 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 10px;
      text-align: center;
      z-index: 1;
    }

    .gesture-hand {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      margin-bottom: 4px;
      color: var(--soft);
    }

    .zone-icon {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      opacity: 0.7;
    }

    /* ═══ FOOTER ═══ */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 6px;
    }

    .platform-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .platform-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .platform-dot:hover {
      transform: scale(1.6);
    }
    .dot-yt {
      background: #FF0044;
      box-shadow: 0 0 6px rgba(255, 0, 68, 0.5);
    }
    .dot-ig {
      background: linear-gradient(135deg, #FCB045, #FD1D1D, #833AB4);
      box-shadow: 0 0 6px rgba(253, 29, 29, 0.4);
    }
    .dot-tt {
      background: #00F2EA;
      box-shadow: 0 0 6px rgba(0, 242, 234, 0.4);
    }

    .cam-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--soft);
      font-size: 10px;
      font-weight: 400;
      transition: color 0.3s;
    }
    .cam-indicator.active {
      color: var(--primary);
    }
    .cam-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--soft);
      transition: all 0.3s;
    }
    .cam-indicator.active .cam-dot {
      background: var(--primary);
      box-shadow: 0 0 8px rgba(94, 234, 212, 0.7);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    /* ═══ ENTRY ANIMATION ═══ */
    .app > * {
      opacity: 0;
      transform: translateY(6px);
      animation: fade-up 0.4s ease forwards;
    }
    .app > *:nth-child(1) { animation-delay: 0.02s; }
    .app > *:nth-child(2) { animation-delay: 0.06s; }
    .app > *:nth-child(3) { animation-delay: 0.10s; }
    .app > *:nth-child(4) { animation-delay: 0.14s; }
    .app > *:nth-child(5) { animation-delay: 0.18s; }

    @keyframes fade-up {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="brand-icon" aria-hidden="true">
        <img src="icons/IconoDef.png" alt="ScrollSense Icon" />
      </div>
      <div class="title">
        <h1>ScrollSense</h1>
        <p>Control gestual para tus feeds</p>
      </div>
    </header>

    <section class="status" id="statusBadge">
      <div class="status-left">
        <div class="status-dot"></div>
        <span class="status-text" id="statusText">Inactivo — activa el seguimiento</span>
      </div>
      <span class="status-badge">dedo</span>
    </section>

    <div class="toggle-wrap">
      <button class="toggle-btn" id="toggleBtn">
        <span id="btnLabel">Activar control por dedo</span>
      </button>
    </div>

    <section class="section">
      <div class="section-header">
        <span>Ajustes</span>
        <span class="label-accent">gesto</span>
      </div>

      <div class="control">
        <div class="control-info">
          <h2>Sensibilidad</h2>
          <p>Velocidad de respuesta al mover el dedo</p>
        </div>
        <div class="slider-wrap">
          <input type="range" id="sensitivitySlider" min="1" max="10" value="5" />
          <span class="slider-val" id="sensitivityVal">5</span>
        </div>
      </div>

      <div class="control">
        <div class="control-info">
          <h2>Zona de gesto</h2>
          <p>&Aacute;rea desde los bordes que activa el scroll</p>
        </div>
        <div class="slider-wrap">
          <input type="range" id="zoneSlider" min="10" max="40" value="25" />
          <span class="slider-val" id="zoneVal">25%</span>
        </div>
      </div>

      <div class="gesture-map" id="zonePreview">
        <div class="zone-top" id="zoneTop">
          <span>Dedo arriba</span>
          <span class="zone-icon">&uarr; Subir</span>
        </div>
        <div class="zone-mid">
          <div>
            <div class="gesture-hand">
              <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 15V10C10 8 13 8 13 10V17L16 7C16.7 4.8 20 5.8 19.3 8L16.8 18L20 16.7C22.5 15.7 24 19 21.6 20.2L18 22C16 29 7 27 6 20L5 15.5C4.5 13.4 7.6 12.8 8.2 14.8L10 20V15Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            Zona neutral
          </div>
        </div>
        <div class="zone-bottom" id="zoneBot">
          <span>Dedo abajo</span>
          <span class="zone-icon">&darr; Bajar</span>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="platform-dots">
        <div class="platform-dot dot-yt" title="YouTube Shorts"></div>
        <div class="platform-dot dot-ig" title="Instagram Reels"></div>
        <div class="platform-dot dot-tt" title="TikTok"></div>
      </div>
      <div class="cam-indicator" id="camIndicator">
        <div class="cam-dot"></div>
        <span id="camText">Camara apagada</span>
      </div>
    </footer>
  </main>

  <script src="popup.js"></script>
</body>
</html>
