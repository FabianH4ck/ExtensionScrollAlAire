<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrollSense</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111111;
      --border: rgba(255, 255, 255, 0.1);
      --text: #f7f4ff;
      --muted: #a7a5be;
      --soft: #74718c;
      --cyan: #00f2fe;    /* TikTok Cyan */
      --pink: #fe0979;    /* TikTok Pink */
      --red: #ff0000;     /* YouTube Red */
      --ig-orange: #fcb045; /* Instagram */
      --ig-pink: #fd1d1d;   /* Instagram */
      --ig-purple: #833ab4; /* Instagram */
      --green: #36d99a;
      --shadow: rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 332px;
      min-height: 480px;
      color: var(--text);
      font: 14px/1.35 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 0% 10%, rgba(255, 0, 0, 0.18), transparent 35%),
        radial-gradient(circle at 100% 10%, rgba(0, 242, 254, 0.15), transparent 35%),
        radial-gradient(circle at 50% 100%, rgba(131, 58, 180, 0.2), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(253, 29, 29, 0.15), transparent 30%),
        #0a0a0a;
      overflow: hidden;
    }

    .app {
      padding: 16px;
    }

    .hero {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .brand-icon {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 12px 28px var(--shadow), 0 0 20px rgba(255, 255, 255, 0.05);
      overflow: hidden;
    }

    .title h1 {
      font-size: 20px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #ff0000, #fd1d1d, #833ab4, #00f2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title p {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(17, 17, 17, 0.8);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--soft);
      flex: 0 0 auto;
    }

    .status-badge.active .status-dot,
    .status.active .status-dot {
      background: var(--green);
      box-shadow: 0 0 10px rgba(54, 217, 154, 0.9);
    }

    .status-text {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status.active .status-text { color: #b8ffd9; }

    .motion-tag {
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--red), var(--ig-purple));
      padding: 2px 6px;
      border-radius: 4px;
    }

    .toggle-btn {
      width: 100%;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: var(--text);
      background: linear-gradient(135deg, rgba(255, 0, 0, 0.15), rgba(131, 58, 180, 0.15), rgba(0, 242, 254, 0.15));
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
      transition: all 0.2s ease;
    }

    .toggle-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 14px 34px rgba(255, 255, 255, 0.1);
    }

    .toggle-btn.on {
      border-color: rgba(54, 217, 154, 0.6);
      background: linear-gradient(135deg, rgba(54, 217, 154, 0.2), rgba(0, 242, 254, 0.15));
    }

    .section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .control {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 13px;
    }

    .control h2 {
      font-size: 13px;
      font-weight: 750;
    }

    .control p {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      width: 88px;
      height: 4px;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 15px;
      height: 15px;
      border: 2px solid #fff;
      border-radius: 50%;
      appearance: none;
      -webkit-appearance: none;
      background: var(--ig-purple);
      box-shadow: 0 0 12px rgba(131, 58, 180, 0.8);
      cursor: pointer;
    }

    .slider-val {
      min-width: 30px;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      text-align: right;
    }

    .gesture-map {
      position: relative;
      height: 116px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 0, 0, 0.12), transparent 35%),
        linear-gradient(0deg, rgba(0, 242, 254, 0.12), transparent 35%),
        rgba(17, 17, 17, 0.7);
    }

    .zone-top,
    .zone-bottom {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.02em;
      transition: height 0.25s ease;
    }

    .zone-top {
      top: 0;
      height: 25%;
      color: #ff6b6b;
      border-bottom: 1px dashed rgba(255, 0, 0, 0.4);
    }

    .zone-bottom {
      bottom: 0;
      height: 25%;
      color: var(--cyan);
      border-top: 1px dashed rgba(0, 242, 254, 0.4);
    }

    .zone-mid {
      position: absolute;
      inset: 25% 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
    }

    .gesture-hand {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      margin-bottom: 3px;
      color: #fff;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 13px;
      color: var(--muted);
      font-size: 11px;
    }

    .cam-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cam-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--soft);
    }

    .cam-indicator.active {
      color: #b8ffd9;
    }

    .cam-indicator.active .cam-dot {
      background: var(--green);
      box-shadow: 0 0 8px rgba(54, 217, 154, 0.8);
    }

    /* Social icons at the bottom */
    .social-icons {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
      opacity: 0.7;
    }
    
    .social-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .yt-dot { background: var(--red); box-shadow: 0 0 5px var(--red); }
    .ig-dot { background: linear-gradient(45deg, var(--ig-orange), var(--ig-pink), var(--ig-purple)); box-shadow: 0 0 5px var(--ig-pink); }
    .tt-dot { background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="brand-icon" aria-hidden="true">
        <img src="icons/IconoDef.png" alt="ScrollSense Icon" style="width: 100%; height: 100%; object-fit: cover;">
      </div>
      <div class="title">
        <h1>ScrollSense</h1>
        <p>Controla tus feeds con gestos</p>
      </div>
    </header>

    <section class="status" id="statusBadge">
      <div class="status-left">
        <div class="status-dot"></div>
        <span class="status-text" id="statusText">Inactivo - activa el seguimiento</span>
      </div>
      <span class="motion-tag">DEDO</span>
    </section>

    <button class="toggle-btn" id="toggleBtn">
      <span id="btnLabel">Activar control por dedo</span>
    </button>

    <section class="section">
      <div class="section-title">
        <span>Ajustes de gesto</span>
        <span>Mano</span>
      </div>

      <div class="control">
        <div>
          <h2>Sensibilidad</h2>
          <p>Respuesta del scroll al mover el dedo.</p>
        </div>
        <div class="slider-wrap">
          <input type="range" id="sensitivitySlider" min="1" max="10" value="5" />
          <span class="slider-val" id="sensitivityVal">5</span>
        </div>
      </div>

      <div class="control">
        <div>
          <h2>Zona de gesto</h2>
          <p>Area superior e inferior que activa el cambio.</p>
        </div>
        <div class="slider-wrap">
          <input type="range" id="zoneSlider" min="10" max="40" value="25" />
          <span class="slider-val" id="zoneVal">25%</span>
        </div>
      </div>

      <div class="gesture-map" id="zonePreview">
        <div class="zone-top" id="zoneTop"><span>Dedo arriba</span><span>Subir</span></div>
        <div class="zone-mid">
          <div>
            <div class="gesture-hand">
              <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 15V10C10 8 13 8 13 10V17L16 7C16.7 4.8 20 5.8 19.3 8L16.8 18L20 16.7C22.5 15.7 24 19 21.6 20.2L18 22C16 29 7 27 6 20L5 15.5C4.5 13.4 7.6 12.8 8.2 14.8L10 20V15Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            Zona neutral
          </div>
        </div>
        <div class="zone-bottom" id="zoneBot"><span>Dedo abajo</span><span>Bajar</span></div>
      </div>
    </section>

    <footer class="footer">
      <div class="social-icons">
        <div class="social-dot yt-dot" title="YouTube Shorts"></div>
        <div class="social-dot ig-dot" title="Instagram Reels"></div>
        <div class="social-dot tt-dot" title="TikTok"></div>
      </div>
      <div class="cam-indicator" id="camIndicator">
        <div class="cam-dot"></div>
        <span id="camText">Camara apagada</span>
      </div>
    </footer>
  </main>

  <script src="popup.js"></script>
</body>
</html>
